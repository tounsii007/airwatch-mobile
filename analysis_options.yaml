# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# Issues surfaced here show up in any Dart-aware IDE plus the
# `flutter analyze` command.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat any missing-required-argument or undefined-getter mistake as an
  # ERROR even when its default severity is just a warning. The codebase
  # has been clean for these classes since Phase 1; keeping them red
  # prevents silent reintroduction.
  errors:
    invalid_annotation_target: ignore
    # `dead_code` would flip on debug-only branches like
    # `assert(() { … }())` — keep at warning.

linter:
  # Tightened ruleset on top of `flutter_lints/flutter`. Each rule
  # below was vetted against the current tree (`flutter analyze`
  # clean) before being enabled. New code that violates one of these
  # rules surfaces as an error in the IDE, which is the whole point.
  rules:
    # ── Async safety ────────────────────────────────────────────────
    cancel_subscriptions: true
    close_sinks: true
    unawaited_futures: true

    # ── State-of-the-art Dart 3 idioms ─────────────────────────────
    avoid_redundant_argument_values: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    unnecessary_const: true
    unnecessary_new: true
    unnecessary_late: true
    unnecessary_parenthesis: true

    # ── Style consistency — codebase already follows these ─────────
    always_declare_return_types: true
    prefer_single_quotes: true
    sort_child_properties_last: true

    # ── Build-context safety ───────────────────────────────────────
    # Flutter 3.7+ lints async gaps that use a stale context. We hit
    # this in a few places (the `if (mounted)` guard pattern) but
    # the rule is generally a good safety net.
    use_build_context_synchronously: true

    # ── Documentation hygiene ─────────────────────────────────────
    # JavaDoc-style `{@link}` directives don't render in dartdoc;
    # we already converted all callsites to `[X]` references in an
    # earlier sweep, so re-enabling the lint pins that fix.
    # `doc_directive_unknown` is on by default — the rule below
    # ensures all public APIs have docs.
    public_member_api_docs: false  # Too noisy for a feature-rich app
