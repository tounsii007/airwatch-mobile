# ─── DEPRECATED — services moved into ../airwatch/docker-compose.yml ──────
#
# The two services that lived here (`airwatch-mobile-web` + the optional
# `airwatch-proxy` Dart sidecar) are now defined in the central
# `airwatch/docker-compose.yml` so a single `docker compose up -d` in
# that directory brings the entire stack — api, web, mobile, observability
# — up at once.
#
# To start just the mobile-web preview from the central compose:
#
#   cd ../airwatch && docker compose up -d airwatch-mobile-web
#
# To start the optional Dart proxy (read-only Airlabs/Open-Meteo passthrough
# for offline demos):
#
#   cd ../airwatch && docker compose --profile proxy up -d
#
# This file is left as a placeholder so existing scripts that
# `cd airwatch-mobile && docker compose ps` don't surface a confusing
# "no such file" error. It defines no services and no volumes, just
# attaches to the same project name so `docker compose ls` continues to
# show one project, not two.

name: airwatch
