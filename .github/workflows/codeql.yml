# CodeQL — GitHub's static analysis for security vulnerabilities.
# Free for public repos. Catches SQL injection, XSS, path traversal,
# hardcoded credentials, deserialization issues, etc. Findings show up
# on the Security tab and as inline PR comments.
#
# NOTE on languages: the app itself is Dart/Flutter, which CodeQL does
# NOT support. What it CAN scan here is the hand-written Android native
# layer (Kotlin: MainActivity, FlightWidgetProvider). We use
# `build-mode: none` so CodeQL analyses the Kotlin sources directly
# without standing up a full Flutter + Gradle Android build — that build
# is heavy, needs the Flutter SDK, and already runs in ci.yml. Source-only
# mode keeps this job fast and reliably green while still flagging issues.
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly re-scan so newly published CodeQL rules can flag old code.
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ "java-kotlin" ]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
