name: AirWatch CI

# Runs on every push and PR to main. Three independent gates — analyze,
# test (unit + widget + integration), and a no-codesign build per
# platform — must all succeed before a PR can land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref so consecutive pushes don't
# stack up minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only GITHUB_TOKEN so a malicious PR can't escalate
# beyond reading the repo. Jobs that need more (e.g. release.yml) opt
# in explicitly. Best practice per:
# https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.41.5'
  FLUTTER_CHANNEL: stable

# NOTE on action pinning — third-party actions in this workflow are
# referenced by floating major-version tag (`@v4`, `@v2`, etc.). That's
# convenient but a compromised maintainer or a hostile force-push to the
# tag can swap the action's code without a corresponding commit in this
# repo. The Dependabot config in `.github/dependabot.yml` watches the
# `github-actions` ecosystem and opens PRs that pin to a specific SHA
# whenever a new release ships, which is the documented safe upgrade
# path. If you need stricter security up front, replace `@vN` with the
# 40-char commit SHA with the version as a trailing comment, e.g.
#   uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Lint + format. Treats warnings as errors so the strict ruleset in
  # analysis_options.yaml stays enforced; "info" lints stay informational
  # to avoid blocking on stylistic suggestions that come and go between
  # SDK bumps.
  # ──────────────────────────────────────────────────────────────────────
  analyze:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: dart format --set-exit-if-changed
        run: dart format --set-exit-if-changed lib/ test/ tool/
      - name: flutter analyze (warnings + infos = error)
        # The codebase is at 0 issues as of commit f18fb4a.
        # `--fatal-infos` locks in the clean state; any future drift
        # (a stray `if (x) doThing()` without braces, an unawaited
        # Future) becomes a hard CI failure rather than slowly
        # accumulating in a green-but-noisy build log.
        run: flutter analyze --fatal-warnings --fatal-infos

  # ──────────────────────────────────────────────────────────────────────
  # Full test matrix — unit, widget, integration. We run them in one job
  # so the Riverpod overrides + shared fixtures stay in a single VM.
  # ──────────────────────────────────────────────────────────────────────
  test:
    name: Test (unit + widget + integration)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Verify airport asset structure
        # Reads `assets/airports.json` and checks every row has 7
        # well-typed fields, ICAO is unique + 4-char, lat/lon are in
        # range, and the dataset isn't accidentally truncated. The
        # asset is the source of truth for the 21 k airport DB after
        # commit 4dde088 — a corrupt/hand-edited copy would silently
        # break airport lookups across the app.
        run: dart run tool/verify_airport_asset.dart
      - name: flutter test --machine
        run: flutter test --machine --reporter expanded > test-report.json || (cat test-report.json; exit 1)
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Web build — quick smoke test that the build graph still resolves and
  # nothing dragged in a non-web-compatible plugin. Artifact is published
  # so reviewers can spin up a preview if needed.
  # ──────────────────────────────────────────────────────────────────────
  build-web:
    name: Build · Web
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v7
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Android APK — debug-signed (CI doesn't have access to the upload key).
  # The release pipeline in release.yml handles the AAB + signing.
  # ──────────────────────────────────────────────────────────────────────
  build-android:
    name: Build · Android (debug-signed APK)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      # Rename the output so the artifact filename reflects reality: the
      # binary was produced with `--release` but signed with the debug
      # keystore because `ANDROID_KEYSTORE_BASE64` (and friends) are not
      # set in CI — only the release.yml pipeline mounts the upload key.
      # An artifact called `app-release.apk` has tricked reviewers into
      # sideloading it onto real devices in the past.
      - name: Rename APK to reflect debug-signing
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/app-debug-signed-ci.apk
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug-signed-ci.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # iOS — no-codesign smoke build. A real release goes through Xcode Cloud
  # or release.yml's macOS runner with the App Store Connect API key.
  # ──────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build · iOS (no-codesign)
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
