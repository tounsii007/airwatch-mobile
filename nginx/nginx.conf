# Custom main nginx config — replaces the upstream Alpine default.
#
# Why we ship our own instead of `sed`-patching the stock one:
#
#   * The stock config sets `pid /var/run/nginx.pid;`, which on Alpine
#     resolves through a `/var/run → /run` symlink. With a read-only
#     root filesystem and no tmpfs at /run, every nginx start dies on
#     `open() "/run/nginx.pid" failed (30: Read-only file system)`.
#   * The stock config also points proxy_temp_path / fastcgi_temp_path
#     at `/var/cache/nginx/...`, which is read-only too unless we mount
#     a tmpfs over it (and tmpfs mode handling in compose's short-form
#     syntax is finicky).
#
# Pinning every writable path to `/tmp` (which is tmpfs in our compose)
# means the read-only root filesystem just works, regardless of whether
# the host or compose-version provides a writable /var/run or
# /var/cache/nginx mount.

user  nginx;
worker_processes  auto;

# Process-local pid + log files. /tmp is mounted as tmpfs with mode 1777
# in docker-compose.yml; the nginx user can write there freely.
pid        /tmp/nginx.pid;

# stdout/stderr is the canonical container-log target — Docker's logging
# driver picks them up automatically. /dev/std{out,err} are character
# devices, always writable, immune to read_only filesystem constraints.
error_log  /dev/stderr notice;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /dev/stdout;

    # Every directive that could open a file for writing under
    # /var/cache or /var/run gets redirected to /tmp. This is what makes
    # the container fully read-only-fs compatible.
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    sendfile           on;
    keepalive_timeout  65;

    # Per-site configs. We only ship one here, baked at build time from
    # nginx/default.conf.template via envsubst — see Dockerfile stage 2.
    include /etc/nginx/conf.d/*.conf;
}
